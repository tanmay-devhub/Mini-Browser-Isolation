# coturn TURN server config for local development NAT traversal testing.
listening-port=3478
listening-ip=0.0.0.0
relay-ip=0.0.0.0

# Shared secret auth (long-term credentials).
lt-cred-mech
user=user:password

# TURN realm.
realm=mini-browser.local

# Log to stdout for docker-compose.
log-file=stdout
no-stdout-log

# Disable fingerprint enforcement for broad client compatibility.

# Allow loopback for local testing (remove in production).
allow-loopback-peers
# Required if you use allow_loopback_peers
cli-password=tanmay

no-tls
no-dtls
# Minimal relay bandwidth; raise in production.
max-bps=500000
