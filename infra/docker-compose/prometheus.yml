global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alerting rules file (optional – add for production alerting).
# rule_files:
#   - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'orchestrator'
    static_configs:
      - targets: ['orchestrator:8090']
    metrics_path: /metrics

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
